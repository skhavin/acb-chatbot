<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACB Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f0f4f8, #e2e8f0); display: flex; justify-content: center; padding: 20px; }
        .main-container { width: 100%; max-width: 1000px; display: flex; gap: 20px; }
        
        /* Form Section */
        .form-section { flex: 1; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-section h2 { color: #004080; margin-bottom: 20px; text-align: center; }
        .form-field { margin-bottom: 15px; }
        .form-field label { display: block; color: #333; font-weight: 600; margin-bottom: 5px; }
        .form-field input, .form-field textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-field input:focus, .form-field textarea:focus { outline: none; border-color: #004080; }
        .form-field.active input, .form-field.active textarea { border-color: #ff6b6b; background: #fff5f5; }
        
        /* Controls */
        .controls { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .mic-btn { background: linear-gradient(135deg, #ff6b6b, #e74c3c); color: white; border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 28px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4); }
        .mic-btn.listening { background: linear-gradient(135deg, #40c057, #2ecc71); animation: pulse 1.5s infinite; }
        .btn { background: #004080; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #0056b3; }
        .btn.submit { background: #2ecc71; }
        .btn.submit:hover { background: #27ae60; }
        
        /* Chat Section */
        .chat-section { width: 400px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .chat-section h2 { color: #004080; margin-bottom: 20px; text-align: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; height: 400px; }
        .message { margin-bottom: 10px; padding: 10px; border-radius: 8px; animation: slideIn 0.3s; }
        .message.user { background: #004080; color: white; margin-left: 30px; }
        .message.bot { background: #e2e8f0; color: #333; margin-right: 30px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); } }
        
        /* Language Selector */
        .language-select { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 8px; border: 2px solid #e2e8f0; font-size: 14px; }
        
        /* AI Features */
        .ai-features { margin-top: 20px; background: #fff3cd; padding: 15px; border-radius: 8px; display: none; }
        .ai-feature { margin: 10px 0; padding: 10px; background: white; border-radius: 8px; }
        .feature-title { font-weight: bold; color: #856404; margin-bottom: 5px; }
        
        /* Progress */
        .progress { text-align: center; margin-bottom: 15px; color: #004080; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Form Section -->
        <div class="form-section">
            <h2>ACB Complaint Registration</h2>
            
            <div class="language-select">
                <label>Language:</label>
                <select id="languageSelect">
                    <option value="en">English</option>
                    <option value="ta">தமிழ்</option>
                    <option value="te">తెలుగు</option>
                    <option value="hi">हिंदी</option>
                    <option value="mr">मराठी</option>
                    <option value="gu">ગુજરાતી</option>
                    <option value="kn">ಕನ್ನಡ</option>
                    <option value="ml">മലയാളം</option>
                    <option value="pa">ਪੰਜਾਬੀ</option>
                    <option value="bn">বাংলা</option>
                    <option value="as">অসমীয়া</option>
                    <option value="or">ଓଡ଼ିଆ</option>
                    <option value="ml">മലയാളം</option>
                    <option value="ks">कॉशुर</option>
                    <option value="si">සිංහල</option>
                    <option value="ne">नेपाली</option>
                    <option value="bo">བོད་སྐད་</option>
                    <option value="sd">سنڌي</option>
                    <option value="mai">मैथिली</option>
                    <option value="mni">মেইতেই</option>
                    <option value="doi">डोगरी</option>
                    <option value="kok">कोंकणी</option>
                    <option value="ur">اردو</option>
                </select>
            </div>
            
            <div class="progress" id="progressText">Click "Start Voice Assistant" to begin</div>
            
            <form id="complaintForm">
                <div class="form-field" data-field="complainant_name">
                    <label>1. Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-field" data-field="complainant_email">
                    <label>2. Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                <div class="form-field" data-field="complainant_phone">
                    <label>3. Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number">
                </div>
                <div class="form-field" data-field="complainant_aadhar">
                    <label>4. Aadhaar Number</label>
                    <input type="text" id="aadhar" placeholder="Enter your 12-digit Aadhaar number">
                </div>
                <div class="form-field" data-field="complaint_details">
                    <label>5. Complaint Details *</label>
                    <textarea id="details" rows="5" placeholder="Describe your complaint in detail" required></textarea>
                </div>
                
                <div class="controls">
                    <button type="button" id="startVoiceBtn" class="mic-btn" title="Start Voice Assistant">🎤</button>
                    <button type="button" id="resetBtn" class="btn">Reset</button>
                    <button type="submit" class="btn submit">Submit Complaint</button>
                </div>
            </form>
            
            <div class="ai-features" id="aiFeatures">
                <h3>AI Analysis</h3>
                <div class="ai-feature">
                    <div class="feature-title">📝 Summary</div>
                    <div id="aiSummary">-</div>
                </div>
                <div class="ai-feature">
                    <div class="feature-title">😊 Sentiment</div>
                    <div id="aiSentiment">-</div>
                </div>
                <div class="ai-feature">
                    <div class="feature-title">⭐ Priority</div>
                    <div id="aiPriority">-</div>
                </div>
            </div>
        </div>
        
        <!-- Chat Section -->
        <div class="chat-section">
            <h2>AI Assistant (Mithra)</h2>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">Hello! I'm Mithra, your ACB assistant. Click the 🎤 button to start voice-based form filling, or just type your complaint details!</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chatInput" style="flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;" placeholder="Type your message...">
                <button id="sendChatBtn" class="btn">Send</button>
            </div>
        </div>
    </div>
    
    <script>
        const BACKEND = "http://localhost:8000";
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let currentStep = -1;
        let complaintQuestionsAnswered = [];
        
        const complaintQuestions = [
            { key: 'incident_date', label: 'Incident Date', prompt: 'When did the incident happen?', id: 'incident_date' },
            { key: 'officer_name', label: 'Officer Name', prompt: 'Who is the officer involved?', id: 'officer_name' },
            { key: 'officer_rank', label: 'Officer Rank', prompt: 'What is the officer\'s rank?', id: 'officer_rank' },
            { key: 'amount', label: 'Bribe Amount', prompt: 'What is the amount of bribe (if any)?', id: 'amount' },
            { key: 'witnesses', label: 'Witnesses', prompt: 'Are there any witnesses?', id: 'witnesses' }
        ];
        
        const formFields = [
            { id: 'name', key: 'complainant_name', label: 'Full Name', prompt: 'What is your full name?' },
            { id: 'email', key: 'complainant_email', label: 'Email', prompt: 'What is your email address?' },
            { id: 'phone', key: 'complainant_phone', label: 'Phone Number', prompt: 'What is your phone number?' },
            { id: 'aadhar', key: 'complainant_aadhar', label: 'Aadhaar Number', prompt: 'What is your Aadhaar number?' },
            { id: 'details', key: 'complaint_details', label: 'Complaint Details', prompt: 'Please describe your complaint in detail.' }
        ];
        
        // Initialize
        let voicesReady = false;
        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = () => { voicesReady = true; };
        }
        document.getElementById('startVoiceBtn').addEventListener('click', toggleVoice);
        document.getElementById('resetBtn').addEventListener('click', resetForm);
        document.getElementById('complaintForm').addEventListener('submit', handleSubmit);
        document.getElementById('sendChatBtn').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });
        
        function addChatMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }
        
        function updateProgress() {
            if (currentStep < 0) {
                document.getElementById('progressText').textContent = 'Click "Start Voice Assistant" to begin';
            } else if (currentStep < formFields.length) {
                document.getElementById('progressText').textContent = `Step ${currentStep + 1}/${formFields.length}: ${formFields[currentStep].label}`;
            } else if (currentStep < formFields.length + complaintQuestions.length) {
                document.getElementById('progressText').textContent = `Additional Details: ${complaintQuestions[currentStep - formFields.length].label}`;
            } else {
                document.getElementById('progressText').textContent = 'All fields filled! Please review and submit.';
            }
            
            // Highlight active field
            document.querySelectorAll('.form-field').forEach(el => el.classList.remove('active'));
            if (currentStep >= 0 && currentStep < formFields.length) {
                const field = document.querySelector(`.form-field[data-field="${formFields[currentStep].key}"]`;
                if (field) field.classList.add('active');
            }
        }
        
        async function toggleVoice() {
            if (isRecording) {
                stopRecording();
            } else {
                if (currentStep < 0) {
                    currentStep = 0;
                    updateProgress();
                    addChatMessage(formFields[0].prompt, 'bot');
                    speak(formFields[0].prompt);
                }
                await startRecording();
            }
        }
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = handleRecordingStop;
                
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('startVoiceBtn').classList.add('listening');
            } catch (e) {
                console.error(e);
                addChatMessage('Error: Unable to access microphone!', 'bot');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            document.getElementById('startVoiceBtn').classList.remove('listening');
        }
        
        async function handleRecordingStop() {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('file', blob, 'recording.webm');
            
            try {
                const sttRes = await fetch(`${BACKEND}/api/stt`, { method: 'POST', body: formData });
                const sttData = await sttRes.json();
                const text = sttData.text || '';
                
                if (text) {
                    addChatMessage(text, 'user');
                    await handleTextInput(text);
                } else {
                    addChatMessage('Sorry, I could not understand that. Please try again.', 'bot');
                }
            } catch (e) {
                console.error(e);
                addChatMessage('Error transcribing audio. Please try again.', 'bot');
            }
        }
        
        async function handleTextInput(text) {
            if (currentStep >= 0 && currentStep < formFields.length) {
                const field = formFields[currentStep];
                document.getElementById(field.id).value = text;
                
                currentStep++;
                updateProgress();
                
                if (currentStep < formFields.length) {
                    addChatMessage(formFields[currentStep].prompt, 'bot');
                    speak(formFields[currentStep].prompt);
                } else {
                    addChatMessage('Thank you! Now, let me ask you some important details about the complaint.', 'bot');
                    speak('Thank you! Now, let me ask you some important details about the complaint.');
                    setTimeout(() => {
                        addChatMessage(complaintQuestions[0].prompt, 'bot');
                        speak(complaintQuestions[0].prompt);
                    }, 2000);
                }
            } else if (currentStep >= formFields.length && currentStep < formFields.length + complaintQuestions.length) {
                const qIdx = currentStep - formFields.length;
                const q = complaintQuestions[qIdx];
                complaintQuestionsAnswered.push({ key: q.key, value: text });
                
                currentStep++;
                updateProgress();
                
                if (currentStep < formFields.length + complaintQuestions.length) {
                    const nextQ = complaintQuestions[currentStep - formFields.length];
                    addChatMessage(nextQ.prompt, 'bot');
                    speak(nextQ.prompt);
                } else {
                    addChatMessage('Great! All details are collected. Please review and submit!', 'bot');
                    speak('Great! All details are collected. Please review and submit!');
                }
            } else {
                await sendToBackend(text);
            }
        }
        
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addChatMessage(text, 'user');
            input.value = '';
            await handleTextInput(text);
        }
        
        async function sendToBackend(text) {
            try {
                const res = await fetch(`${BACKEND}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                addChatMessage(data.response, 'bot');
                speak(data.response);
            } catch (e) {
                addChatMessage('Sorry, I could not process that request.', 'bot');
            }
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            
            const formData = {
                complainant_name: document.getElementById('name').value,
                complainant_email: document.getElementById('email').value,
                complainant_phone: document.getElementById('phone').value,
                complainant_aadhar: document.getElementById('aadhar').value,
                complaint_details: document.getElementById('details').value,
                additional_details: JSON.stringify(complaintQuestionsAnswered)
            };
            
            // Analyze
            try {
                const analyzeRes = await fetch(`${BACKEND}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const analysis = await analyzeRes.json();
                
                document.getElementById('aiFeatures').style.display = 'block';
                document.getElementById('aiSummary').textContent = analysis.summary;
                document.getElementById('aiSentiment').textContent = `${analysis.sentiment} (${analysis.confidence}%)`;
                document.getElementById('aiPriority').textContent = analysis.priority;
                
                // Submit
                const submitRes = await fetch(`${BACKEND}/api/complaints/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const submitData = await submitRes.json();
                
                addChatMessage(`Complaint submitted successfully! Your Complaint ID is ${submitData.complaint_id}`, 'bot');
                alert(`Complaint submitted successfully! Complaint ID: ${submitData.complaint_id}`);
            } catch (e) {
                console.error(e);
                addChatMessage('Error submitting complaint. Please try again.', 'bot');
            }
        }
        
        function resetForm() {
            currentStep = -1;
            complaintQuestionsAnswered = [];
            document.getElementById('complaintForm').reset();
            updateProgress();
            document.getElementById('aiFeatures').style.display = 'none';
        }
        
        function speak(text) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                
                const langSelect = document.getElementById('languageSelect');
                const lang = langSelect.value === 'en' ? 'en-IN' : langSelect.value + '-' + langSelect.value.toUpperCase();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                
                // Load voices
                const loadVoices = () => {
                    const voices = speechSynthesis.getVoices();
                    let femaleVoice = null;
                    
                    for (const voice of voices) {
                        const vLower = voice.name.toLowerCase();
                        if (voice.lang.includes('IN') || voice.lang.includes('India')) {
                            if (vLower.includes('female') || vLower.includes('google') || vLower.includes('mithra')) {
                                femaleVoice = voice;
                                break;
                            }
                        }
                    }
                    
                    if (!femaleVoice) {
                        for (const voice of voices) {
                            const vLower = voice.name.toLowerCase();
                            if (vLower.includes('female')) {
                                femaleVoice = voice;
                                break;
                            }
                        }
                    }
                    
                    if (femaleVoice) {
                        utterance.voice = femaleVoice;
                    }
                    
                    speechSynthesis.speak(utterance);
                };
                
                if (speechSynthesis.getVoices().length === 0) {
                    speechSynthesis.onvoiceschanged = () => {
                        loadVoices();
                    };
                } else {
                    loadVoices();
                }
            }
        }
    </script>
</body>
</html>
